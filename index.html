<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>無限美食大富翁</title>
    <style>
        :root {
            --primary-color: #ffd700;
            --active-color: #ff4500;
        }
        body { font-family: sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; padding: 20px; }
        .container { text-align: center; max-width: 800px; width: 100%; }
        
        /* 輸入與控制區 */
        .controls { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { padding: 10px; border: 2px solid #ddd; border-radius: 6px; width: 200px; font-size: 1rem; }
        button { cursor: pointer; padding: 10px 20px; border-radius: 6px; border: none; font-weight: bold; transition: 0.2s; }
        .add-btn { background-color: #007bff; color: white; }
        .decide-btn { background-color: #28a745; color: white; font-size: 1.2rem; margin-top: 10px; width: 200px; }
        .decide-btn:disabled { background-color: #ccc; }

        /* 大富翁格子容器：使用 Flex 自動換行 */
        .board {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            min-height: 200px;
        }

        /* 單個格子樣式 */
        .cell {
            width: 100px;
            height: 100px;
            background: white;
            border: 3px solid #eee;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.1s;
            word-break: break-all;
            padding: 5px;
            font-weight: bold;
        }

        /* 跑馬燈選中效果 */
        .cell.active {
            border-color: var(--active-color);
            background-color: var(--primary-color);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.4);
            z-index: 5;
        }

        /* 刪除按鈕 */
        .delete-x {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4d4d;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            line-height: 20px;
            cursor: pointer;
            display: none;
        }
        .cell:hover .delete-x { display: block; }

        #result-display {
            font-size: 2rem;
            margin: 20px 0;
            color: #333;
            height: 50px;
            font-weight: 900;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎲 無限美食大富翁</h1>
    
    <div class="controls">
        <input type="text" id="foodInput" placeholder="想吃什麼？" onkeypress="if(event.key==='Enter') addFood()">
        <button class="add-btn" onclick="addFood()">新增選項</button>
        <br>
        <button class="decide-btn" id="startBtn" onclick="startGame()">幫我選一個！</button>
    </div>

    <div id="result-display">今天吃什麼好呢？</div>

    <div class="board" id="board">
        <!-- JS 會在這裡動態產生格子 -->
    </div>
</div>

<script>
    // 初始化清單
    let foods = ["牛肉麵", "壽司", "滷肉飯", "便利商店", "水餃", "麥當勞", "義大利麵", "火鍋"];
    let currentIndex = -1;
    let isRunning = false;

    // 渲染所有格子
    function renderBoard() {
        const board = document.getElementById("board");
        board.innerHTML = ""; // 清空
        
        foods.forEach((food, index) => {
            const div = document.createElement("div");
            div.className = "cell";
            div.id = `cell-${index}`;
            div.innerHTML = `
                <span class="delete-x" onclick="removeFood(${index})">✕</span>
                <div>${food}</div>
            `;
            board.appendChild(div);
        });
    }

    // 新增
    function addFood() {
        const input = document.getElementById("foodInput");
        const val = input.value.trim();
        if (val) {
            foods.push(val);
            input.value = "";
            renderBoard();
        }
    }

    // 刪除
    function removeFood(index) {
        if (isRunning) return;
        foods.splice(index, 1);
        renderBoard();
    }

    // 開始跑馬燈
    function startGame() {
        if (isRunning || foods.length === 0) return;
        
        isRunning = true;
        document.getElementById("startBtn").disabled = true;
        document.getElementById("result-display").innerText = "挑選中...";

        let rounds = 3; // 固定繞三圈
        let totalSteps = (foods.length * rounds) + Math.floor(Math.random() * foods.length);
        let currentStep = 0;
        let speed = 60; // 初始速度

        // 如果之前有選中的，先清除
        if (currentIndex !== -1) {
            document.getElementById(`cell-${currentIndex}`).classList.remove('active');
        }
        
        // 跑馬燈遞迴函式
        function move() {
            // 清除前一格
            if (currentIndex !== -1) {
                document.getElementById(`cell-${currentIndex}`).classList.remove('active');
            }

            // 往下走一格
            currentIndex = (currentIndex + 1) % foods.length;
            document.getElementById(`cell-${currentIndex}`).classList.add('active');

            currentStep++;

            if (currentStep < totalSteps) {
                // 減速邏輯
                if (totalSteps - currentStep < 10) {
                    speed += 50;
                }
                setTimeout(move, speed);
            } else {
                // 結束點餐
                isRunning = false;
                document.getElementById("startBtn").disabled = false;
                const finalFood = foods[currentIndex];
                document.getElementById("result-display").innerText = "🎉 就決定是：" + finalFood;
            }
        }
        
        currentIndex = -1; // 每次重頭開始跑
        move();
    }

    // 初始執行一次
    renderBoard();
</script>

</body>
</html>
