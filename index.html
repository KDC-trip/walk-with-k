<style>
    :root { --active-color: #e67e22; }
    .theme-meal { --active-color: #e67e22; background-color: #fdf2e9; }
    .theme-snack { --active-color: #ff6b81; background-color: #fff0f3; }
    .theme-night { --active-color: #6c5ce7; background-color: #f3f0ff; }

    body { 
        display: flex; flex-direction: column; align-items: center; 
        min-height: 100vh; margin: 0; font-family: "Microsoft JhengHei", sans-serif; 
        padding: 10px; transition: 0.3s; 
    }

    /* 頂部導覽：手機版自動換行 */
    .nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 15px; width: 100%; }
    .nav button { padding: 8px 15px; border-radius: 20px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 14px; }

    /* 主容器：寬度改為百分比，最大不超過 580px */
    .container { 
        text-align: center; background: white; padding: 20px; 
        border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        width: 95%; max-width: 580px; box-sizing: border-box; 
        min-height: auto; margin-bottom: 30px;
    }

    h1 { color: var(--active-color); margin: 5px 0 15px; font-size: 1.8rem; }

    /* 輸入區：手機版寬度調整 */
    .controls { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; }
    input { padding: 10px; border: 2px solid #eee; border-radius: 10px; width: 60%; outline: none; }
    .add-btn { background-color: var(--active-color); color: white; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; }

    /* 遊戲視窗：核心修正！使用 aspect-ratio 維持正方形且不溢出 */
    .game-view { 
        width: 100%; max-width: 450px; aspect-ratio: 1 / 1; 
        margin: 0 auto; position: relative; 
        display: flex; align-items: center; justify-content: center; 
    }

    /* 格子文字在手機版縮小 */
    .cell { 
        background: white; border: 1px solid #eee; border-radius: 10px; 
        display: flex; align-items: center; justify-content: center; 
        font-weight: bold; font-size: clamp(10px, 3vw, 14px); /* 自動縮放字體 */
        color: #555; text-align: center; padding: 2px; overflow: hidden;
    }

    /* 夜市版縮放 */
    .slot-machine { padding: 20px; width: 80%; }
    .slot-window { width: 100%; height: 80px; font-size: 1.5rem; }
    .lever-base { height: 100px; }

    /* 獎池清單：手機版文字縮小 */
    .food-pool { margin-top: 20px; padding: 10px; }
    .pool-item { font-size: 12px; padding: 4px 10px; }

    /* 響應式微調：針對極小螢幕 */
    @media (max-width: 400px) {
        h1 { font-size: 1.5rem; }
        .main-btn { padding: 12px 25px; font-size: 1rem; }
    }
</style>
