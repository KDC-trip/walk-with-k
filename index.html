<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>美食全攻略 - 大富翁 & 抽獎球</title>
    <style>
        :root {
            --main-orange: #e67e22;
            --main-pink: #ff6b81;
            --main-purple: #a29bfe;
        }
        body { background-color: #fdf2e9; transition: 0.5s; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: "Microsoft JhengHei", sans-serif; }
        
        /* 模式切換按鈕 */
        .nav { position: fixed; top: 20px; display: flex; gap: 10px; z-index: 100; }
        .nav button { padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .container { text-align: center; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 600px; position: relative; overflow: hidden; }
        
        /* 正餐版大富翁樣式 */
        .board { display: grid; gap: 10px; margin: 20px auto; width: 450px; height: 450px; position: relative; }
        .cell { background: white; border: 2px solid #eee; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; color: #555; transition: 0.1s; text-align: center; padding: 5px; }
        .cell.active { background-color: #ffeb3b !important; border-color: var(--active-color) !important; transform: scale(1.1); z-index: 5; box-shadow: 0 0 15px rgba(0,0,0,0.2); }

        /* 夜市版：轉盤風格 */
        .wheel-mode .cell { border-radius: 50%; border-style: solid; background: #f1f2f6; }
        
        .center-area { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; width: 40%; }
        .decide-btn { width: 100%; padding: 15px; font-size: 1.2rem; border-radius: 50px; border: none; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        
        input { padding: 10px; border: 2px solid #eee; border-radius: 8px; width: 180px; outline: none; }
        #result-text { font-size: 1.6rem; font-weight: bold; margin-top: 20px; min-height: 40px; }

        /* 不同模式的主題色 */
        .theme-meal { --active-color: #e67e22; }
        .theme-snack { --active-color: #ff6b81; }
        .theme-night { --active-color: #6c5ce7; }
    </style>
</head>
<body class="theme-meal">

    <div class="nav">
        <button style="background: #e67e22; color: white;" onclick="switchMode('meal')">🍱 正餐大富翁</button>
        <button style="background: #ff6b81; color: white;" onclick="switchMode('snack')">🍰 點心午茶</button>
        <button style="background: #6c5ce7; color: white;" onclick="switchMode('night')">🎡 夜市抽獎</button>
    </div>

    <div class="container" id="mainContainer">
        <h1 id="title" style="color: var(--active-color)">🍱 正餐大富翁</h1>
        
        <div class="controls">
            <input type="text" id="foodInput" placeholder="新增清單..." onkeypress="if(event.key==='Enter') addFood()">
            <button onclick="addFood()" style="background: var(--active-color)">新增</button>
        </div>

        <div class="board" id="board">
            <div class="center-area">
                <button class="decide-btn" id="startBtn" onclick="startGame()" style="background: var(--active-color)">幫我選一個</button>
            </div>
        </div>

        <div id="result-text">今天想吃什麼呢？</div>
    </div>

<script>
    // 預設清單（已移除豆花）
    const data = {
        meal: ["牛肉麵", "壽司", "滷肉飯", "便利商店", "水餃", "煎餃", "麥當勞", "義大利麵", "火鍋", "拉麵", "便當", "肯德基"],
        snack: ["雞蛋仔", "紅豆餅", "雞排", "地瓜球", "手搖飲", "可麗餅", "甜甜圈", "鬆餅", "豆花", "冰淇淋"],
        night: ["臭豆腐", "蚵仔煎", "大腸包小腸", "烤魷魚", "排骨酥", "章魚燒", "地瓜球", "骰子牛", "糖葫蘆", "滷味", "鹹酥雞", "胡椒餅"]
    };
    
    const fillers = ["下 1 格", "前 3 格", "下 2 格", "再選一次"];
    let currentMode = 'meal';
    let foods = [...data.meal];
    let gridContent = [];
    let currentIndex = 0;
    let isRunning = false;

    function switchMode(mode) {
        if(isRunning) return;
        currentMode = mode;
        foods = [...data[mode]];
        
        // 切換視覺主題
        document.body.className = `theme-${mode}`;
        const container = document.getElementById('mainContainer');
        if(mode === 'night') container.classList.add('wheel-mode');
        else container.classList.remove('wheel-mode');
        
        const titles = { meal: "🍱 正餐大富翁", snack: "🍰 點心午茶", night: "🎡 夜市抽獎" };
        document.getElementById('title').innerText = titles[mode];
        
        renderBoard();
    }

    function renderBoard() {
        const board = document.getElementById("board");
        board.querySelectorAll('.cell').forEach(c => c.remove());

        let n = 4;
        while ((4 * n - 4) < foods.length) n++;
        const total = 4 * n - 4;

        let combined = [...foods].sort(() => Math.random() - 0.5);
        let fIdx = 0;
        while (combined.length < total) {
            combined.push(fillers[fIdx % fillers.length]);
            fIdx++;
        }
        gridContent = combined.sort(() => Math.random() - 0.5);

        board.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
        board.style.gridTemplateRows = `repeat(${n}, 1fr)`;

        const path = [];
        for (let i = 0; i < n; i++) path.push({r: 1, c: i + 1});
        for (let i = 2; i < n; i++) path.push({r: i, c: n});
        for (let i = n; i >= 1; i--) path.push({r: n, c: i});
        for (let i = n - 1; i >= 2; i--) path.push({r: i, c: 1});

        gridContent.forEach((text, i) => {
            const div = document.createElement('div');
            div.className = 'cell' + (fillers.includes(text) ? ' special' : '');
            div.id = `cell-${i}`;
            div.innerText = text;
            div.style.gridRow = path[i].r;
            div.style.gridColumn = path[i].c;
            board.appendChild(div);
        });
    }

    function addFood() {
        const val = document.getElementById("foodInput").value.trim();
        if (val) {
            foods.push(val);
            document.getElementById("foodInput").value = "";
            renderBoard();
        }
    }

    function startGame() {
        if (isRunning) return;
        isRunning = true;
        document.getElementById("startBtn").disabled = true;
        document.getElementById("result-text").innerText = "命運轉動中...";

        // 增加隨機性：圈數隨機 3~6 圈
        let rounds = Math.floor(Math.random() * 4) + 3;
        let totalSteps = (gridContent.length * rounds) + Math.floor(Math.random() * gridContent.length);
        let currentStep = 0;
        let speed = 40;

        function roll() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            currentIndex = (currentIndex + 1) % gridContent.length;
            document.getElementById(`cell-${currentIndex}`).classList.add('active');

            currentStep++;
            if (currentStep < totalSteps) {
                // 模擬變速效果
                if (totalSteps - currentStep < 15) speed += 30;
                setTimeout(roll, speed);
            } else {
                handleResult();
            }
        }
        roll();
    }

    function handleResult() {
        const res = gridContent[currentIndex];
        if (fillers.includes(res)) {
            document.getElementById("result-text").innerText = `🎲 抽到：${res}！`;
            // 此處可加入自動跳轉邏輯
            isRunning = false;
            document.getElementById("startBtn").disabled = false;
        } else {
            document.getElementById("result-text").innerText = `🎉 決定吃：${res}`;
            isRunning = false;
            document.getElementById("startBtn").disabled = false;
        }
    }

    renderBoard();
</script>
</body>
</html>
